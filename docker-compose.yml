services:
  solarimetro-milano:
    image: pv-hub:0.1
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"     # SCADA web UI + JSON/SSE API
      - "502:502"       # Modbus TCP
    # Binding 502 needs the net-bind capability when running non-root.
    # Alternative: set PVHUB_MODBUS_PORT=1502 and map "1502:1502" instead.
    cap_add:
      - NET_BIND_SERVICE
    environment:
      PVHUB_SITE_NAME: "Impianto Demo — Milano"
      PVHUB_LATITUDE: "45.4642"
      PVHUB_LONGITUDE: "9.1900"
      PVHUB_TILT_DEG: "30"
      PVHUB_AZIMUTH_DEG: "180"          # 180 = South
      PVHUB_ALBEDO: "0.20"
      PVHUB_DEFAULT_THEME: "auto"       # auto | dark | light
      # --- optional tuning ---
      # PVHUB_CELLTEMP: "faiman"        # faiman | noct
      # PVHUB_POLL_INTERVAL_S: "600"    # weather refresh cadence
      # PVHUB_SOLAR_INTERVAL_S: "60"    # sun-position recompute cadence
      # PVHUB_MODBUS_WORD_ORDER: "abcd" # abcd | cdab (many PLCs want cdab)
      # PVHUB_MODBUS_UNIT_ID: "1"
      # PVHUB_OPENMETEO_API_KEY: ""     # for the commercial Open-Meteo plan
    healthcheck:
      test: ["CMD", "/pv-hub", "--healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
